<div class="contact-container">
  @for (item of contact; track item.name) {
    <div class="contact">
      <img [src]="item.icon" alt="{{ item.name }} icon" class="contact-icon">
      <div class="skill-info">
        <h3>{{ item.name }}</h3>
        <a [href]="item.link">{{ item.medio }}</a>
      </div>
    </div>
  }
</div>
