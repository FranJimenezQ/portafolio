<div class="skills-container">
  @for (skill of skills; track skill.name) {
    <div class="skill">
      <img [src]="skill.icon" alt="{{ skill.name }} icon" class="skill-icon">
      <div class="skill-info">
        <h3>{{ skill.name }}</h3>
        <p>{{ skill.description }}</p>
      </div>
    </div>
  }
</div>
